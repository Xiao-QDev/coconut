name: Build and Release Pico

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential
      
    - name: Build
      run: |
        gcc -std=c11 -Wall -Wextra -O2 -Isrc -DPICO_RUNTIME_DIR=\"src\" src/*.c src/stdlib/*.c -lm -lpthread -o pico
      
    - name: Test
      run: ./pico examples/hello.pico
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico-linux
        path: pico

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-make
        
    - name: Build
      shell: msys2 {0}
      run: |
        gcc -std=c11 -Wall -Wextra -O2 -Isrc -DPICO_RUNTIME_DIR=\"src\" src/*.c src/stdlib/*.c -lm -lpthread -lws2_32 -o pico.exe
      
    - name: Test
      shell: msys2 {0}
      run: ./pico.exe examples/hello.pico
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico-windows
        path: pico.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: gcc -std=c11 -Wall -Wextra -O2 -Isrc -DPICO_RUNTIME_DIR=\"src\" src/*.c src/stdlib/*.c -lm -lpthread -o pico
    - name: Test
      run: ./pico examples/hello.pico
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico-macos
        path: pico

  build-wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
    - name: Build WASM
      run: |
        emcc -std=c11 -O2 -Isrc \
          src/ast.c src/error.c src/gc.c src/interpreter.c src/lexer.c \
          src/parser.c src/value.c src/wasm_entry.c src/stdlib/json.c \
          -s WASM=1 \
          -s EXPORTED_FUNCTIONS='["_pico_wasm_run","_malloc","_free"]' \
          -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
          -s ALLOW_MEMORY_GROWTH=1 \
          -o pico.js
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pico-wasm
        path: |
          pico.js
          pico.wasm

  release:
    needs: [build-linux, build-windows, build-macos, build-wasm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: pico-linux
        path: ./release/linux

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: pico-windows
        path: ./release/windows

    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: pico-macos
        path: ./release/macos

    - name: Download WASM Artifact
      uses: actions/download-artifact@v4
      with:
        name: pico-wasm
        path: ./release/wasm

    - name: Prepare release files
      run: |
        VER=${{ github.ref_name }}
        mv ./release/linux/pico        ./release/pico-linux-${VER}
        mv ./release/windows/pico.exe  ./release/pico-windows-${VER}.exe
        mv ./release/macos/pico        ./release/pico-macos-${VER}
        mv ./release/wasm/pico.js      ./release/pico-${VER}.js
        mv ./release/wasm/pico.wasm    ./release/pico-${VER}.wasm
        chmod +x ./release/pico-linux-${VER} ./release/pico-macos-${VER}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./release/pico-linux-${{ github.ref_name }}
          ./release/pico-windows-${{ github.ref_name }}.exe
          ./release/pico-macos-${{ github.ref_name }}
          ./release/pico-${{ github.ref_name }}.js
          ./release/pico-${{ github.ref_name }}.wasm
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
